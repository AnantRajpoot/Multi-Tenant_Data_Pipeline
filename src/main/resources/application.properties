# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/pipeline_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=always

# Server
server.port=8085

# File upload settings
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Output directory for file exports
pipeline.output.directory=./output

# Jasypt Encryption Configuration (Phase 2)
# IMPORTANT: In production, use environment variable: -Djasypt.encryptor.password=YOUR_SECRET_KEY
jasypt.encryptor.password=local-dev-password-change-in-production
jasypt.encryptor.algorithm=PBEWithMD5AndDES

# AWS/S3 Configuration (Phase 2)
# These are examples - use environment variables or credentials storage in production
aws.s3.endpoint=
aws.s3.region=us-east-1
aws.s3.access-key=
aws.s3.secret-key=

# MinIO Configuration (Phase 2, optional)
# Example: minio.endpoint=http://localhost:9000
minio.endpoint=
minio.access-key=
minio.secret-key=

